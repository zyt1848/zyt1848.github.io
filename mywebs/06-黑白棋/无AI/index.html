<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑白棋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>黑白棋</h2>
        <div class="player-info">
            <div>白子: <span id="player1">2</span></div>
            <div>黑子: <span id="player2">2</span></div>
        </div>
        <div class="who-next">
            <p><span id="chesscolor"></span>棋回合</p>
            <div class="chess"></div>
        </div>
        
    </header>
    <div class="container">
        <div class="chessboard">
            <!-- <div class="cell">
                <div class="chess chess-white"></div>
            </div> -->
        </div>
    </div>
    <footer>
        <button class="reset-btn">重置</button>
        <button class="change-player">切换先手</button>
        <button class="show-hint-btn">显示提示</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
